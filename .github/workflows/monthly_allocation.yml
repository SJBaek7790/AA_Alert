name: Monthly Portfolio Allocation

on:
  schedule:
    # Run on 25th-31st of each month at 18:00 KST (09:00 UTC)
    # The script itself checks if today is the day before the last business day
    - cron: '0 1 26-31 * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Needed to commit allocation_history.json

jobs:
  run-allocation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run allocation script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python allocation.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add allocation_history.json
          git diff --staged --quiet || git commit -m "Update allocation history $(date +%Y-%m-%d)"
          git pull --rebase
          git push
